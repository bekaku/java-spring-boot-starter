environments:
  production: false
spring:
  main:
    allow-circular-references: false
  #    lazy-initialization: true
  devtools:
    restart:
      poll-interval: 10s
      #      quiet-period: 1s
      enabled: false
      exclude: static/**
    #      additional-paths: i18n/**,mapper/**
    livereload:
      enabled: true
  jpa:
    #    open-in-view: false
    properties:
      hibernate:
        generate_statistics: true
    hibernate:
      ddl-auto: update  #update, none  validate Hibernate ddl auto (none, create, create-drop, validate, update)

  output:
    ansi:
      enabled: ALWAYS
  datasource:

    # normal connection to mysql server
    #    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/spring_starter?allowPublicKeyRetrieval=true&useSSL=false
    # link to docker config from docker-compose.yml
    #    url: jdbc:mysql://${MYSQL_HOST:docker-mysql}:3306/spring_starter?allowPublicKeyRetrieval=true&useSSL=false
    # connect to mysql form local docker via port 3308

    # MySql
    #    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/spring_starter?allowPublicKeyRetrieval=true&useSSL=false
    #    username: root
    #    password: your_strong_password
    #    driver-class-name: com.mysql.cj.jdbc.Driver

    # Postgres
    url: jdbc:postgresql://localhost:5432/spring_starter_postgres
    username: postgres_user
    password: your_strong_password
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  mvc:
    async:
      request-timeout: -1 # 30000 =30 seconds timeout for async requests, -1 is no limit
    static-path-pattern: /content/**
  thymeleaf:
    cache: false
    #spring.freemarker.suffix=.html
    suffix: .html
    mode: HTML
    encoding: UTF-8
    prefix: classpath:/templates/
  resources:
    cache:
      period: 0
  rabbitmq:
    dynamic: true
    #host: 192.168.7.31
    host: 127.0.0.1
    port: 5672
    username: local_jobs
    password: 'pwd'
#  ai:
#    ollama:
#      base-url: http://localhost:11434
#      chat:
#        options:
#          model: qwen2.5:1.5b #scb10x/llama3.1-typhoon2-8b-instruct
#          temperature: 0.3
#      embedding:
#        options:
#          model: bge-m3
#
#    vectorstore:
#      qdrant:
#        host: localhost
#        port: 6334
#        collection-name: typhoon_documents
#        initialize-schema: true

logging:
  config: classpath:log4j2-dev.xml
  pattern:
    rolling-file-name: "${LOG_FILE}.%d{yyyy-MM-dd}.%i"
  level:
    root: WARN
    web: DEBUG
    com.bekaku.api.spring: DEBUG
    org.springframework.boot.web.embedded.undertow: DEBUG
    io.qdrant.client.QdrantGrpcClient: ERROR
    io.undertow: DEBUG
    org.springframework.security: DEBUG
    org:
      springframework: ERROR
      hibernate:
        stat: DEBUG
        SQL: TRACE
        type: ERROR
  file:
    path: ${app.cdn-directory}logs
    #    path: D:/code/tutorial/spring-data/logs
    max-history: 30
    total-size-cap: 10MB
    clean-history-on-start: true
server:
  port: 8080
  http2:
    enabled: true
  error:
    whitelabel:
      enabled: false
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
    path: /api-docs
app:
  cors:
    allowed-origins:
      - http://localhost:3004 # Ionic dev (Development Web)
      - http://localhost:3003 # Frontend dev server
      - https://localhost:3003 # Frontend dev server
      - http://localhost      # Android Hybrid App (Dev/Prod)
      - https://localhost
      - capacitor://localhost # iOS Hybrid App (Dev/Prod)
      - ionic://localhost

  url: http://localhost
  port: 8080
  test-prop: develop mode
  version: 1.0.1
  cdn-directory: D:/code/github/java-spring-starter/spring-data/  #mac /Users/bekaku/code/github/java-spring-boot-starter/spring-data/
  cdn-path: file:///${app.cdn-directory}
  #  cdn-path: file:///D:/code/tutorial/spring-data/

  #Dev
  #  cdn-url: http://127.0.0.1
  cdn-url: ${app.url}
  cdn-port: 8080

  jwt:
    secret: eL2kRSFLRFicsrgtOISl1LKqrCChkzGS9UxrXep3b7z0OvkGoejNMbbyqCMVuDshBogW1Q1IqvsvSwMs78vLBn
    #millisecond default is 2592000= 1 month, 86400 = 1 days, 604800=7 days, 3600=1 hour, 900=15 minutes, 600=10 minutes , 60 = 1 minute
    session-time: 604800
    session-refresh-time: 2592000
    session-day: 30
  front-end:
    theme: NUXT_QUASAR #NUXT_QUASAR, QUASAR
  rag:
    chunk-size: 800
    chunk-size-char: 350
    chunk-length-embed: 5

custom:
  config:
    file: Config Spring Startertemplate From DEVELOPMENT MODE (resources/application-dev.yml)